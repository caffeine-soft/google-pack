name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
          
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --package android-signer-cli
        
      - name: Prepare binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/android-signer-cli${{ matrix.suffix }}"
          target_bin="android-signer-cli-${{ matrix.target }}${{ matrix.suffix }}"
          cp "$bin" "$target_bin"
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: android-signer-cli-${{ matrix.target }}${{ matrix.suffix }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
