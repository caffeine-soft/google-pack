name: Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --package android-signer-cli

      - name: Prepare binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/android-signer-cli${{ matrix.suffix }}"
          target_bin="android-signer-cli-${{ matrix.target }}${{ matrix.suffix }}"
          cp "$bin" "$target_bin"

      - name: Archive binary
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          path: android-signer-cli-${{ matrix.target }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v7
        with:
          pattern: binary-*
          merge-multiple: true
          path: release-binaries

      - name: Create Release and Upload
        uses: caffeine-soft/github-release-tag@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          generate_release: "true"
          artifacts: "release-binaries/*"
